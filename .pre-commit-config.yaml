# pre-commit (https://pre-commit.com) — local quality gate before push.
# Mirrors CI so failures surface locally first.
# rev pinned to immutable tags. Update with `pre-commit autoupdate`.
# Setup: `pre-commit install && pre-commit install --hook-type pre-push`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^docs/
      - id: end-of-file-fixer
        exclude: ^docs/
      - id: check-yaml
      - id: check-json
        exclude: ^biome\.json$ # JSONC (comments allowed)
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  # biome — lint + format + import sort for JSON / JS / TS (uses the project biome via bun).
  - repo: local
    hooks:
      - id: biome
        name: biome check (write)
        entry: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true
        language: system
        types_or: [javascript, jsx, ts, tsx, json]
        require_serial: false

  # tsc — type-check the TS runtime (the whole point of the Bun/TS migration).
  - repo: local
    hooks:
      - id: typecheck
        name: tsc --noEmit
        entry: bunx tsc --noEmit
        language: system
        pass_filenames: false
        files: \.ts$

  - repo: https://github.com/crate-ci/typos
    rev: v1.46.0
    hooks:
      - id: typos
        pass_filenames: false # use _typos.toml [files]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Behavioral tests are the oracle (bun test) — run on push (mirror CI).
  - repo: local
    hooks:
      - id: bun-test
        name: bun test (behavioral oracle)
        entry: bun test
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: \.ts$

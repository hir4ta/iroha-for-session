name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Please don't paste secrets or private Notion content.**
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run /iroha:...
        2. ...
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Claude Code version, OS, Notion plan (free/paid), and which command.
    validations:
      required: false

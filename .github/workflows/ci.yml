name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dev deps
        run: npm install

      - name: Lint (biome)
        run: npm run lint

      - name: Shellcheck
        run: find scripts hooks tests -name '*.sh' -print0 | xargs -0 shellcheck

      - name: Behavioral selftest
        run: npm run test:bash

      - name: Recall quality eval
        run: npm run test:recall

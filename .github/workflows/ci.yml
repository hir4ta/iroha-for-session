name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit, not just the tip

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dev deps
        run: npm install

      - name: Lint (biome)
        run: npm run lint

      - name: Shellcheck
        run: find scripts hooks tests -name '*.sh' -print0 | xargs -0 shellcheck

      # Secret + typo scans — mirror the pre-commit hooks so a contributor without the
      # pre-push hook installed cannot land a secret or typo on a green CI (the gap that
      # let CI pass while pre-commit ⊋ CI). Same tool versions as .pre-commit-config.yaml.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typo scan (typos)
        uses: crate-ci/typos@v1.46.0

      - name: Behavioral selftest
        run: npm run test:bash

      - name: Recall quality eval
        run: npm run test:recall

      - name: Recall scale check
        run: npm run test:scale

      - name: Rerank precision eval (skips unless the opt-in model is installed)
        run: npm run test:rerank

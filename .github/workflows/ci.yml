name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # node is only for the OPT-IN heavy-tier model scripts (scripts/*.mjs); the FREE tier and all
      # of `bun test` need only bun. Without the ~700MB models the rerank eval SKIPs (exit 0).
      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint (biome)
        run: bun run lint

      - name: Typecheck (tsc)
        run: bun run typecheck

      # Secret + typo scans — run them THROUGH pre-commit (not the standalone marketplace actions)
      # so CI uses the EXACT same hooks, pinned versions, and .gitignore / _typos.toml handling as a
      # developer's local `pre-commit run`. pre-commit guarantees CI == local.
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Secret scan (gitleaks)
        run: pre-commit run gitleaks --all-files
      - name: Typo scan (typos)
        run: pre-commit run typos --all-files

      - name: Behavioral test (bun test — the oracle)
        run: bun test

      - name: Recall quality eval (FREE tier BM25)
        run: bun run test:recall

      - name: Recall scale check
        run: bun run test:scale

      - name: Rerank precision eval (skips unless the opt-in model is installed)
        run: bun run test:rerank

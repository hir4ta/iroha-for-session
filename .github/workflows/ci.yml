name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the repo.
permissions:
  contents: read

# A newer push to the same ref cancels the older, still-running CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Static analysis: formatting/lint + types. Fast; fails the PR on style or type drift.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Lint (biome)
        run: bun run lint
      - name: Typecheck (tsc)
        run: bun run typecheck

  # Behavioral oracle: the in-process unit tests for the deterministic libs + hooks.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Behavioral test (bun test — the oracle)
        run: bun test

  # Recall quality: local BM25 accuracy + scale, both against the frozen fixture corpus
  # (tests/fixtures/recall-corpus) so a workspace re-save never drifts them. No models, no network.
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Recall quality eval (local BM25)
        run: bun run test:recall
      - name: Recall scale check
        run: bun run test:scale

  # Supply-chain hygiene: secret + typo scans run THROUGH pre-commit so CI uses the EXACT same
  # pinned hooks / .gitignore / _typos.toml as a developer's local `pre-commit run` (CI == local).
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Secret scan (gitleaks)
        run: pre-commit run gitleaks --all-files
      - name: Typo scan (typos)
        run: pre-commit run typos --all-files

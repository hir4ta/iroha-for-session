name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dev deps
        run: npm install

      - name: Lint (biome)
        run: npm run lint

      - name: Shellcheck
        run: find scripts hooks tests -name '*.sh' -print0 | xargs -0 shellcheck

      # Secret + typo scans — run them THROUGH pre-commit (not the standalone marketplace actions)
      # so CI uses the EXACT same hooks, pinned versions, and .gitignore / _typos.toml handling as a
      # developer's local `pre-commit run`. The standalone crate-ci/typos action diverged — it
      # scanned gitignored node_modules (present after `npm install`) and failed on a vendored
      # "Hashi" in @types/node, which local pre-commit correctly skips. pre-commit guarantees CI==local.
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Secret scan (gitleaks)
        run: pre-commit run gitleaks --all-files
      - name: Typo scan (typos)
        run: pre-commit run typos --all-files

      - name: Behavioral selftest
        run: npm run test:bash

      - name: Recall quality eval
        run: npm run test:recall

      - name: Recall scale check
        run: npm run test:scale

      - name: Rerank precision eval (skips unless the opt-in model is installed)
        run: npm run test:rerank

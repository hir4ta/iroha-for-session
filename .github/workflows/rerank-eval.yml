name: Hybrid recall eval (manual / weekly)

# The HEAVY recall tier is OPT-IN: a ~570MB cross-encoder (bge-reranker-v2-m3) + a ~120MB dense
# embedder (multilingual-e5-small) that the pure-bash default does NOT need. The always-on CI
# (ci.yml) already verifies the pure-bash recall path AND the heavy-tier PLUMBING (embed/rerank
# contract + graceful BM25 fallback, in tests/selftest.sh). What it cannot verify without the models
# is the heavy-tier QUALITY: end-to-end recall (BM25 ∪ dense -> rerank promotion recovers the
# candidate-generation MISS BM25 alone cannot), cross-domain abstention, and the cross-encoder's
# unit precision (0 false-injection on hard negatives). This job closes that gap on the REAL default
# models — but NOT on push/PR: a ~700MB Hugging Face download per push would be slow and couple every
# build to HF uptime, the wrong trade for an opt-in feature. So opt-in feature, opt-in verification:
# trigger by hand (workflow_dispatch) or let the weekly cron run it. Non-blocking, so a transient HF
# hiccup never blocks a PR — just re-run it.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  hybrid-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # node runs the opt-in heavy-tier model scripts (scripts/*.mjs).
      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      # The heavy-tier runtime is a per-user opt-in dep (kept out of the shipped package.json), so
      # install it here (CI-ephemeral) — same as scripts/rerank-setup.ts does for a real user.
      - name: Install deps + heavy-tier runtime
        run: |
          bun install --frozen-lockfile
          bun add @huggingface/transformers

      # Cache both models across runs, keyed on the immutable model ids (so the weekly + manual runs
      # reuse them; only a cache miss re-downloads). They live where embed.mjs / rerank.mjs look
      # (IROHA_MODEL_DIR, default $HOME/.iroha/models).
      - name: Cache heavy-tier models
        uses: actions/cache@v4
        with:
          path: ~/.iroha/models
          key: iroha-hybrid-models-bge-reranker-v2-m3-q8-and-e5-small-q8

      # Pre-download both models on a cache miss (ALLOW_DOWNLOAD=1). At eval time embed/rerank run
      # cache-only (no download), so the models must be present before the evals.
      - name: Pre-fetch models (cache miss only; evals run offline-from-cache)
        run: |
          printf '%s' '{"query":"warmup","docs":[{"id":"w","text":"warmup passage"}],"threshold":0.0,"topn":1}' \
            | IROHA_RERANK_ALLOW_DOWNLOAD=1 IROHA_MODEL_DIR="$HOME/.iroha/models" \
              node scripts/rerank.mjs
          printf '%s' '{"query":"warmup","docs":[{"id":"w","text":"warmup passage"}],"topk":1}' \
            | IROHA_EMBED_ALLOW_DOWNLOAD=1 IROHA_MODEL_DIR="$HOME/.iroha/models" \
              node scripts/embed.mjs

      # End-to-end hybrid quality: recall recovery of the BM25 candidate-generation miss, 100%
      # cross-domain abstention, and the reported same-vocab soft-leak rate (recall-first, low-harm).
      - name: Hybrid recall eval (BM25 ∪ dense -> rerank)
        run: IROHA_MODEL_DIR="$HOME/.iroha/models" bun run test:hybrid

      # Cross-encoder unit precision: 0 false-injection on hard negatives + the JP/EN synonym recall.
      - name: Rerank precision eval (bge-reranker-v2-m3)
        run: IROHA_MODEL_DIR="$HOME/.iroha/models" bun run test:rerank
